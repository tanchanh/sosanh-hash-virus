<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>So Sánh File / Hash / Kiểm Virus - D.T.Chánh</title>
    <style>
        :root {
            --primary-color: #6D20B5;
            --bg-color: #9494945c;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #4b5563;
            --border-color: #d1d5db;
            --btn-gray: #6b7280;

            /* Result states colors */
            --res-yellow-bg: #fffbeb;
            --res-blue-bg: #eff6ff;
            --res-green-bg: #ecfdf5;
            --res-red-bg: #fef2f2;
            --res-green-border: #047857;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 0.5rem 0.5rem 5rem 0.5rem;
        }

        .main-content {
            width: 100%;
            max-width: 40rem;
            background-color: var(--card-bg);
            padding: 1rem;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .title {
            font-size: 1.5rem;
            margin-bottom: 0.25rem;
            text-align: center;
            color: var(--text-main);
        }

        .author {
            text-align: right;
            font-size: 1.2rem;
            color: var(--text-muted);
            margin-bottom: 1rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        .label {
            display: block;
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--text-main);
            margin-bottom: 0.5rem;
        }

        .file-input-wrapper {
            position: relative;
            cursor: pointer;
            width: 100%;
        }

        .file-input-wrapper.dragover .main-btn {
            background-color: #8400ff;
            transform: scale(1.02);
            box-shadow: 0 4px 12px rgba(109, 32, 181, 0.3);
        }

        .main-btn {
            display: block;
            padding: 0.6rem 1rem;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: 1.1rem;
            text-align: center;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s ease-in-out;
        }

        .file-input {
            opacity: 0;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .file-name {
            margin-top: 0.5rem;
            font-size: 1.1rem;
            color: var(--text-main);
            word-break: break-all;
        }

        .file-hash {
            font-size: 0.95rem;
            color: var(--text-muted);
            word-break: break-all;
            margin-top: 0.25rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
        }

        .action-btn {
            padding: 0.3rem 0.6rem;
            background-color: var(--btn-gray);
            color: white;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 1rem;
            white-space: nowrap;
            text-align: center;
            line-height: 1.2;
            flex-shrink: 0;
        }

        #clearHashBtn,
        #pasteHashBtn {
            background-color: var(--btn-gray);
            flex: 1;
            padding: 0.5rem;
            font-size: 1.1rem;
            border-radius: 0.5rem;
        }

        .action-btn br {
            display: none;
        }

        @media (max-width: 480px) {
            .action-btn {
                white-space: normal;
                padding: 0.3rem 0.4rem;
                min-width: 4.5rem;
            }

            .action-btn br {
                display: block;
            }
        }

        .result-box {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 0.5rem;
            text-align: center;
            font-weight: bold;
            font-size: 1.1rem;
            transition: opacity 0.3s ease-in-out;
            opacity: 0;
            color: var(--text-main);
        }

        .result-box.visible {
            opacity: 1;
        }

        .result-box.yellow {
            background-color: var(--res-yellow-bg);
        }

        .result-box.blue {
            background-color: var(--res-blue-bg);
        }

        .result-box.green {
            background-color: var(--res-green-bg);
        }

        .result-box.red {
            background-color: var(--res-red-bg);
        }

        .hash-input-group {
            margin-top: 1.5rem;
            width: 100%;
        }

        .hash-input {
            width: 100%;
            padding: 0.5rem;
            border: 2px solid var(--border-color);
            border-radius: 0.5rem;
            font-size: 1rem;
            margin-bottom: 0.5rem;
        }

        .hash-input::placeholder {
            color: var(--btn-gray);
        }

        .hash-input.match {
            background-color: var(--res-green-bg);
            border-color: var(--res-green-border);
        }

        .file-hash.match {
            background-color: var(--res-green-bg);
            border-radius: 0.25rem;
            padding: 0.25rem;
        }

        .hash-btn-container {
            display: flex;
            align-items: center;
            width: 100%;
            gap: 0.5rem;
        }

        .mt-6 {
            margin-top: 1.5rem;
        }
    </style>
</head>

<body>
    <div class="main-content">
        <h2 class="title">So Sánh File / Hash / Kiểm Virus</h2>
        <div class="author">D.T.Chánh</div>

        <div class="input-group">
            <div class="file-input-wrapper">
                <label for="file1" class="main-btn">Chọn File 1</label>
                <input type="file" id="file1" class="file-input" />
            </div>
            <p id="file1-name" class="file-name"></p>
            <p id="file1-hash" class="file-hash"></p>
        </div>

        <div class="input-group">
            <div class="file-input-wrapper">
                <label for="file2" class="main-btn">Chọn File 2</label>
                <input type="file" id="file2" class="file-input" />
            </div>
            <p id="file2-name" class="file-name"></p>
            <p id="file2-hash" class="file-hash"></p>
        </div>

        <div id="result" class="result-box"></div>

        <div class="hash-input-group">
            <label class="label"><strong>Nhập Hash Để So Sánh / Kiểm Virus Online:</strong></label>
            <input type="text" id="inputHash" class="hash-input" placeholder="Nhập SHA256 để kiểm tra...">
            <div class="hash-btn-container">
                <button id="clearHashBtn" class="action-btn">Xoá</button>
                <button id="pasteHashBtn" class="action-btn">Dán</button>
            </div>
        </div>

        <button id="virusBtn" class="main-btn mt-6">
            Kiểm Virus Online
        </button>
    </div>



    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const file1Input = document.getElementById('file1');
            const file2Input = document.getElementById('file2');
            const file1Name = document.getElementById('file1-name');
            const file2Name = document.getElementById('file2-name');
            const file1Hash = document.getElementById('file1-hash');
            const file2Hash = document.getElementById('file2-hash');
            const resultDiv = document.getElementById('result');
            const inputHash = document.getElementById('inputHash');
            const clearHashBtn = document.getElementById('clearHashBtn');
            const pasteHashBtn = document.getElementById('pasteHashBtn');
            const virusBtn = document.getElementById('virusBtn');

            let currentHash1 = null;
            let currentHash2 = null;

            // Hàm định dạng kích thước file theo đơn vị phù hợp
            function formatBytes(bytes) {
                if (bytes === 0) return '0 B';
                const k = 1024;
                const sizes = ['B', 'KB', 'MB', 'GB'];
                const i = Math.floor(Math.log(bytes) / Math.log(k));
                const size = parseFloat((bytes / Math.pow(k, i)).toFixed(2));
                return size + ' ' + sizes[i];
            }

            // Hàm tính SHA256
            async function calculateSHA256(file) {
                const arrayBuffer = await file.arrayBuffer();
                const hashBuffer = await crypto.subtle.digest('SHA-256', arrayBuffer);
                const hashArray = Array.from(new Uint8Array(hashBuffer));
                return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            }

            // Hàm sao chép hash vào clipboard
            async function copyToClipboard(text, element) {
                try {
                    await navigator.clipboard.writeText(text);
                    const original = element.innerHTML;
                    element.innerHTML = 'Sao <br>Chép!';
                    setTimeout(() => {
                        element.innerHTML = original;
                    }, 2000);
                } catch (err) {
                    console.error('Không thể sao chép hash:', err);
                }
            }

            // Hàm so sánh hash nhập vào với hash của file
            function compareInputHash() {
                const input = inputHash.value.trim();
                const hash1 = currentHash1;
                const hash2 = currentHash2;

                // Reset màu nền
                inputHash.classList.remove('match');
                file1Hash.classList.remove('match');
                file2Hash.classList.remove('match');

                if (!hash1 && !hash2) {
                    showResult('Vui lòng chọn file để so sánh hash.', 'yellow');
                    return;
                }

                if (input.length === 64) {
                    let matchCount = 0;

                    if (input.toLowerCase() === hash1?.toLowerCase()) {
                        inputHash.classList.add('match');
                        file1Hash.classList.add('match');
                        matchCount++;
                    }

                    if (input.toLowerCase() === hash2?.toLowerCase()) {
                        inputHash.classList.add('match');
                        file2Hash.classList.add('match');
                        matchCount++;
                    }

                    if (matchCount === 0) {
                        showResult('Hash không trùng với cả hai file.', 'red');
                    } else if (matchCount === 2) {
                        showResult('Hash trùng với cả hai file.', 'green');
                    } else if (input.toLowerCase() === hash1?.toLowerCase()) {
                        showResult('Hash trùng với File 1.', 'green');
                    } else if (input.toLowerCase() === hash2?.toLowerCase()) {
                        showResult('Hash trùng với File 2.', 'green');
                    }
                } else if (input) {
                    showResult('Hash không hợp lệ (phải có 64 ký tự hex).', 'red');
                }
            }

            // Hàm xóa hash
            function clearInputHash() {
                inputHash.value = '';
                inputHash.classList.remove('match');
                file1Hash.classList.remove('match');
                file2Hash.classList.remove('match');
                resultDiv.className = 'result-box';
                resultDiv.textContent = '';
            }

            // Hàm so sánh hash của 2 file
            function compareFiles() {
                if (!currentHash1 || !currentHash2) {
                    showResult('Vui lòng chọn cả hai file để so sánh.', 'yellow');
                    return;
                }

                showResult('Đang so sánh...', 'blue');

                try {
                    // So sánh hash
                    if (currentHash1 === currentHash2) {
                        showResult('Hai file hoàn toàn trùng khớp.', 'green');
                    } else {
                        showResult('Hai file KHÔNG trùng khớp.', 'red');
                    }

                    // So sánh với hash nhập vào (nếu có)
                    compareInputHash();

                } catch (error) {
                    console.error("Lỗi khi so sánh file:", error);
                    showResult('Đã xảy ra lỗi khi so sánh file.', 'red');
                }
            }

            // Hiển thị tên file và hash khi chọn
            file1Input.addEventListener('change', async () => {
                const file = file1Input.files[0];
                if (file) {
                    file1Name.innerHTML = `<strong>File đã chọn:</strong> ${file.name} (${formatBytes(file.size)})`;
                    file1Hash.innerHTML = 'Đang tính hash...';
                    try {
                        const hash = await calculateSHA256(file);
                        currentHash1 = hash;
                        file1Hash.innerHTML = `<div><strong>SHA256:</strong> ${hash}</div><button class="action-btn" onclick="copyToClipboard('${hash}', this)">Sao <br>Chép</button>`;
                        if (file2Input.files[0]) {
                            compareFiles();
                        }
                    } catch (e) {
                        file1Hash.innerHTML = 'Lỗi tính hash';
                    }
                } else {
                    file1Name.innerHTML = '';
                    file1Hash.innerHTML = '';
                    currentHash1 = null;
                }
            });

            file2Input.addEventListener('change', async () => {
                const file = file2Input.files[0];
                if (file) {
                    file2Name.innerHTML = `<strong>File đã chọn:</strong> ${file.name} (${formatBytes(file.size)})`;
                    file2Hash.innerHTML = 'Đang tính hash...';
                    try {
                        const hash = await calculateSHA256(file);
                        currentHash2 = hash;
                        file2Hash.innerHTML = `<div><strong>SHA256:</strong> ${hash}</div><button class="action-btn" onclick="copyToClipboard('${hash}', this)">Sao <br>Chép</button>`;
                        if (file1Input.files[0]) {
                            compareFiles();
                        }
                    } catch (e) {
                        file2Hash.innerHTML = 'Lỗi tính hash';
                    }
                } else {
                    file2Name.innerHTML = '';
                    file2Hash.innerHTML = '';
                    currentHash2 = null;
                }
            });

            // Sự kiện nhập hash
            inputHash.addEventListener('input', compareInputHash);

            // Sự kiện nhấn nút Xoá
            clearHashBtn.addEventListener('click', clearInputHash);

            // Sự kiện nhấn nút Dán để dán từ clipboard
            pasteHashBtn.addEventListener('click', async () => {
                try {
                    const text = await navigator.clipboard.readText();
                    inputHash.value = text.trim();
                    compareInputHash(); // Tự động chạy so sánh sau khi dán
                } catch (err) {
                    console.error('Không thể đọc dữ liệu từ clipboard:', err);
                    alert('Không thể truy cập clipboard của bạn. Vui lòng tự dán thủ công.');
                }
            });

            // Sự kiện nhấn nút Kiểm Virus Online
            virusBtn.addEventListener('click', () => {
                const hash = inputHash.value.trim();
                window.open(hash ? 'https://www.virustotal.com/gui/file/' + hash : 'https://www.virustotal.com', '_blank');
            });

            // Tích hợp tính năng kéo thả file vào vùng chọn file
            const wrappers = document.querySelectorAll('.file-input-wrapper');
            wrappers.forEach(wrapper => {
                const input = wrapper.querySelector('.file-input');

                // Ngăn chặn hành vi mặc định khi kéo file qua
                ['dragenter', 'dragover'].forEach(eventName => {
                    wrapper.addEventListener(eventName, (e) => {
                        e.preventDefault();
                        e.stopPropagation();
                        wrapper.classList.add('dragover');
                    }, false);
                });

                ['dragleave', 'drop'].forEach(eventName => {
                    wrapper.addEventListener(eventName, (e) => {
                        e.preventDefault();
                        e.stopPropagation();
                        wrapper.classList.remove('dragover');
                    }, false);
                });

                // Xử lý sự kiện thả file
                wrapper.addEventListener('drop', (e) => {
                    const dt = e.dataTransfer;
                    const files = dt.files;
                    if (files.length > 0) {
                        input.files = files; // Gán danh sách file vào input type file
                        // Kích hoạt sự kiện 'change' trên input để chạy logic đọc và tính hash hiện tại
                        input.dispatchEvent(new Event('change'));
                    }
                }, false);
            });

            /**
             * Hiển thị kết quả trên giao diện
             * @param {string} message - Thông điệp kết quả
             * @param {string} type - Loại kết quả ('yellow', 'blue', 'green', 'red')
             */
            function showResult(message, type) {
                resultDiv.textContent = message;
                resultDiv.className = `result-box visible ${type}`;
            }

            // Gắn hàm copyToClipboard vào window để có thể gọi từ HTML
            window.copyToClipboard = copyToClipboard;
        });
    </script>
</body>

</html>
